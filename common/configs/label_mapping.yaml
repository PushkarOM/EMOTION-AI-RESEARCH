  amusement: happy
  anger: angry
  annoyance: angry
  approval: happy
  caring: happy
  confusion: neutral     
  curiosity: neutral     
  desire: happy
  disappointment: sad
  disapproval: angry
  disgust: disgust
  embarrassment: fear     
  excitement: happy
  fear: fear
  gratitude: happy
  grief: sad
  joy: happy
  love: happy
  nervousness: fear
  optimism: happy
  pride: happy
  realization: neutral   
  relief: happy
  remorse: sad
  sadness: sad
  surprise: surprise
  neutral: neutral